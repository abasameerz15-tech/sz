<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Script Vault • رفع سكربتات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(0, 180, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(180, 0, 255, 0.06) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 36px;
            padding: 36px 28px;
            max-width: 620px;
            width: 100%;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-icon {
            font-size: 3.2rem;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 12px rgba(161, 140, 209, 0.5));
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 4px 0;
        }

        .badge-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0 6px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #cdd9f4;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge i {
            color: #ffd966;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.25), transparent);
            margin: 20px 0 18px;
        }

        .section-title {
            color: #e2e8f4;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #c084fc;
        }

        /* Textarea */
        .textarea-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            background: rgba(10, 10, 25, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 18px;
            font-size: 0.9rem;
            font-family: 'Cairo', monospace;
            color: #eef5ff;
            resize: vertical;
            outline: none;
            transition: all 0.25s ease;
            box-shadow: inset 0 6px 16px rgba(0,0,0,0.6);
            line-height: 1.7;
        }

        textarea:focus {
            border-color: #a78bfa;
            box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.25), inset 0 6px 16px #000;
        }

        textarea::placeholder {
            color: #5b6e8c;
            font-family: 'Cairo', sans-serif;
        }

        .char-counter {
            text-align: left;
            font-size: 0.75rem;
            color: #7c8aa5;
            margin-top: 6px;
            padding: 0 8px;
        }

        /* CAPTCHA */
        .captcha-box {
            background: rgba(15, 15, 30, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 16px;
            margin: 18px 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .captcha-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .captcha-header span {
            font-weight: 700;
            color: #d1d5f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .captcha-header i {
            color: #fbbf24;
        }

        .captcha-question {
            background: #0b0b1a;
            padding: 14px;
            border-radius: 18px;
            text-align: center;
            font-weight: 800;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: #fff;
            user-select: none;
            border: 1px dashed rgba(255,255,255,0.2);
        }

        .captcha-input-row {
            display: flex;
            gap: 10px;
        }

        .captcha-input-row input {
            flex: 1;
            background: #0b0b1a;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 14px;
            color: #fff;
            font-weight: 700;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }

        .captcha-input-row input:focus {
            border-color: #c084fc;
        }

        .captcha-refresh {
            background: #2d2a4a;
            border: none;
            color: #e0d7ff;
            border-radius: 18px;
            padding: 0 18px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .captcha-refresh:hover {
            background: #3d3870;
        }

        /* IP info */
        .ip-badge {
            background: rgba(255,255,255,0.05);
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            color: #b4c2e0;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 14px;
        }

        .ip-badge i {
            color: #60a5fa;
        }

        /* Buttons */
        .btn-glow {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 8px;
        }

        .btn-glow:active {
            transform: scale(0.96);
            box-shadow: 0 4px 12px rgba(124,58,237,0.6);
        }

        .btn-glow:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Display page */
        .display-card {
            background: rgba(10, 10, 28, 0.8);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 14px 0;
            min-height: 140px;
            word-break: break-word;
            white-space: pre-wrap;
            color: #e0e7ff;
            font-size: 0.9rem;
            line-height: 1.8;
            user-select: none;
            position: relative;
        }

        .display-card .watermark {
            position: absolute;
            bottom: 8px;
            right: 16px;
            font-size: 0.6rem;
            color: #4b5675;
        }

        .action-row {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        .action-btn {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            color: #e2e8f4;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            backdrop-filter: blur(6px);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1b3a;
            color: #f0e9ff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 12px 30px black;
            z-index: 99;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 500px) {
            .container { padding: 24px 16px; }
            .logo-text { font-size: 1.8rem; }
            .action-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- ========== قسم الإنشاء (يظهر افتراضياً) ========== -->
        <div id="createSection">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-shield-haltered"></i></div>
                <div class="logo-text">Script Vault</div>
                <div class="badge-row">
                    <div class="badge"><i class="fas fa-lock"></i> Roblox Scripts</div>
                    <div class="badge"><i class="fas fa-cloud"></i> روابط دائمة</div>
                </div>
            </div>
            <div class="divider"></div>

            <!-- IP Info -->
            <div class="ip-badge" id="ipDisplay">
                <i class="fas fa-globe"></i> <span id="ipText">جاري فحص الاتصال...</span>
            </div>

            <div class="section-title"><i class="fas fa-code"></i> ارفع السكربت</div>
            <div class="textarea-wrapper">
                <textarea id="scriptInput" placeholder="الصق السكربت هنا... يجب أن يبدأ بـ loadstring أو --"></textarea>
            </div>
            <div class="char-counter"><span id="charCount">0</span> / 10000 حرف</div>

            <!-- كابتشا احترافية -->
            <div class="captcha-box">
                <div class="captcha-header">
                    <span><i class="fas fa-robot"></i> تأكيد بشري</span>
                    <button class="captcha-refresh" id="refreshCaptcha"><i class="fas fa-sync-alt"></i></button>
                </div>
                <div class="captcha-question" id="captchaQuestion">5 + 3 = ؟</div>
                <div class="captcha-input-row">
                    <input type="text" id="captchaInput" placeholder="أدخل الناتج" inputmode="numeric">
                </div>
            </div>

            <button class="btn-glow" id="uploadBtn">
                <i class="fas fa-cloud-upload-alt"></i> إنشاء رابط دائم
            </button>
            <div style="text-align:center; margin-top:10px; font-size:0.7rem; color:#5a6480;">
                <i class="fas fa-info-circle"></i> يُسمح فقط بالسكربتات التي تبدأ بـ loadstring أو --
            </div>
        </div>

        <!-- ========== قسم العرض (يظهر عند وجود v=) ========== -->
        <div id="displaySection" class="hidden">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-file-code"></i></div>
                <div class="logo-text">Script Vault</div>
                <div class="badge-row">
                    <div class="badge"><i class="fas fa-eye"></i> نص مرفوع</div>
                </div>
            </div>
            <div class="divider"></div>

            <div class="display-card" id="displayContent">
                <span style="color:#5b6e8c;">جاري التحميل...</span>
                <div class="watermark"><i class="fas fa-shield"></i> غير قابل للتحديد</div>
            </div>

            <div class="action-row">
                <button class="action-btn" id="copyDisplayBtn"><i class="fas fa-copy"></i> نسخ</button>
                <button class="action-btn" id="shareDisplayBtn"><i class="fas fa-share-alt"></i> مشاركة</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ========== FIREBASE CONFIG ==========
            const firebaseConfig = {
                apiKey: "AIzaSyDummyKey", // ⚠️ استبدل بمفاتيحك
                authDomain: "save-link-34c39.firebaseapp.com",
                databaseURL: "https://save-link-34c39-default-rtdb.firebaseio.com/",
                projectId: "save-link-34c39",
                storageBucket: "save-link-34c39.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abcdef"
            };
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();

            // ========== DOM ==========
            const createSection = document.getElementById('createSection');
            const displaySection = document.getElementById('displaySection');
            const scriptInput = document.getElementById('scriptInput');
            const charCount = document.getElementById('charCount');
            const uploadBtn = document.getElementById('uploadBtn');
            const captchaQuestion = document.getElementById('captchaQuestion');
            const captchaInput = document.getElementById('captchaInput');
            const refreshCaptcha = document.getElementById('refreshCaptcha');
            const ipText = document.getElementById('ipText');
            const displayContent = document.getElementById('displayContent');
            const copyDisplayBtn = document.getElementById('copyDisplayBtn');
            const shareDisplayBtn = document.getElementById('shareDisplayBtn');
            const toast = document.getElementById('toast');

            let currentCaptchaAnswer = 0;
            let currentDisplayText = '';

            // ========== TOAST ==========
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
            }

            // ========== IP FETCH ==========
            async function fetchIP() {
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ipText.textContent = `IP: ${data.ip} • تم التحقق`;
                } catch (e) {
                    ipText.textContent = 'IP: غير معروف';
                }
            }
            fetchIP();

            // ========== CAPTCHA ==========
            function generateCaptcha() {
                const a = Math.floor(Math.random() * 12) + 2;
                const b = Math.floor(Math.random() * 12) + 2;
                const ops = ['+', '-', '×'];
                const op = ops[Math.floor(Math.random() * ops.length)];
                let answer;
                switch(op) {
                    case '+': answer = a + b; break;
                    case '-': answer = a - b; break;
                    case '×': answer = a * b; break;
                    default: answer = a + b;
                }
                captchaQuestion.textContent = `${a} ${op} ${b} = ؟`;
                currentCaptchaAnswer = answer;
                captchaInput.value = '';
            }
            generateCaptcha();
            refreshCaptcha.addEventListener('click', generateCaptcha);

            // ========== VALIDATION ==========
            function isValidScript(text) {
                const trimmed = text.trim();
                return trimmed.startsWith('loadstring') || trimmed.startsWith('--');
            }

            scriptInput.addEventListener('input', () => {
                charCount.textContent = scriptInput.value.length;
            });

            // ========== UPLOAD ==========
            uploadBtn.addEventListener('click', async () => {
                const text = scriptInput.value.trim();
                if (!text) return showToast('⚠️ الرجاء لصق السكربت');
                if (!isValidScript(text)) {
                    return showToast('❌ يجب أن يبدأ السكربت بـ loadstring أو --');
                }
                const userAnswer = parseInt(captchaInput.value.trim(), 10);
                if (isNaN(userAnswer) || userAnswer !== currentCaptchaAnswer) {
                    generateCaptcha();
                    return showToast('❌ إجابة الكابتشا خاطئة');
                }

                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';

                try {
                    const key = generateKey();
                    await db.ref('scripts/' + key).set({
                        content: text,
                        time: Date.now()
                    });
                    const shortURL = location.origin + location.pathname + '?v=' + key;
                    currentDisplayText = text;
                    switchToDisplay(text);
                    showToast('✅ تم إنشاء الرابط');
                    navigator.clipboard.writeText(shortURL).then(() => showToast('📋 الرابط تم نسخه'));
                } catch (e) {
                    showToast('❌ فشل الاتصال بقاعدة البيانات');
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> إنشاء رابط دائم';
                }
            });

            function generateKey() {
                return Math.random().toString(36).substring(2, 8) + Date.now().toString(36);
            }

            // ========== DISPLAY ==========
            function switchToDisplay(text) {
                createSection.classList.add('hidden');
                displaySection.classList.remove('hidden');
                displayContent.innerHTML = escapeHTML(text).replace(/\n/g, '<br>') + 
                    '<div class="watermark"><i class="fas fa-shield"></i> غير قابل للتحديد</div>';
                currentDisplayText = text;
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // منع التحديد والنسخ من صندوق العرض
            displayContent.addEventListener('copy', e => e.preventDefault());
            displayContent.addEventListener('contextmenu', e => e.preventDefault());
            displayContent.addEventListener('selectstart', e => e.preventDefault());

            // نسخ ومشاركة
            copyDisplayBtn.addEventListener('click', () => {
                if (!currentDisplayText) return;
                navigator.clipboard.writeText(currentDisplayText).then(() => showToast('📋 تم النسخ'));
            });

            shareDisplayBtn.addEventListener('click', () => {
                if (!currentDisplayText) return;
                if (navigator.share) {
                    navigator.share({ text: currentDisplayText }).catch(()=>{});
                } else {
                    navigator.clipboard.writeText(currentDisplayText).then(() => showToast('📋 تم النسخ للمشاركة'));
                }
            });

            // ========== LOAD FROM URL ==========
            async function loadFromURL() {
                const params = new URLSearchParams(location.search);
                const key = params.get('v');
                if (!key) return;
                createSection.classList.add('hidden');
                displaySection.classList.remove('hidden');
                try {
                    const snap = await db.ref('scripts/' + key).once('value');
                    const data = snap.val();
                    if (data && data.content) {
                        switchToDisplay(data.content);
                    } else {
                        displayContent.innerHTML = '<span style="color:#f87171;">الرابط غير صالح أو منتهي</span>';
                    }
                } catch (e) {
                    displayContent.innerHTML = '<span style="color:#f87171;">خطأ في التحميل</span>';
                }
            }

            loadFromURL();
        })();
    </script>
</body>
</html>
