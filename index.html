<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختصر روابط عباس - DEVSZ</title>
    <style>
        :root {
            --main-purple: #8a2be2;
            --main-blue: #007bff;
            --text-white: #ffffff;
            --accent-red: #ff3e3e;
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .star { position: absolute; background: white; border-radius: 50%; animation: moveUp linear infinite; }
        @keyframes moveUp { from { transform: translateY(100vh); } to { transform: translateY(-10vh); } }

        .alert-text {
            position: absolute; top: 8%; color: var(--accent-red);
            font-weight: bold; font-size: 18px; z-index: 10;
            animation: floatUpDown 2s ease-in-out infinite;
        }
        @keyframes floatUpDown { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .container {
            position: relative; z-index: 5; text-align: center;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 35px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2); width: 85%; max-width: 420px;
        }

        h1 { font-size: 22px; margin-bottom: 10px; color: #fff; }
        .rights { font-size: 14px; color: #ccc; margin-bottom: 25px; }
        .rights a { color: var(--main-blue); text-decoration: none; font-weight: bold; }

        .input-label { display: block; text-align: right; margin-bottom: 8px; color: #bbb; font-size: 14px; }
        input {
            width: 100%; padding: 15px; background: #111; border: 1px solid #333;
            color: #00ff88; border-radius: 12px; font-size: 16px; text-align: left;
            direction: ltr; box-sizing: border-box; margin-bottom: 20px;
        }

        .btn-short {
            width: 100%; background: linear-gradient(45deg, var(--main-purple), var(--main-blue));
            color: white; border: none; padding: 15px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-short:active { transform: scale(0.95); }

        #result-area {
            margin-top: 20px; padding: 15px; background: rgba(0, 255, 136, 0.1);
            border-radius: 10px; display: none; border: 1px dashed #00ff88;
        }
        #short-url { color: #00ff88; word-break: break-all; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars" id="star-box"></div>
    <div class="alert-text">⚠️ النسخة النهائية - اختصار مباشر</div>

    <div class="container">
        <h1>مرحبٱ بك في مختصر روابط DEVSZ</h1>
        <p class="rights">حقوق عباس: <a href="https://t.me/DEVSZ_STORE" target="_blank">اضغط هنا</a></p>

        <label class="input-label">ضع رابطك:</label>
        <input type="text" id="long-url" placeholder="https://example.com/...">

        <button class="btn-short" onclick="shortenLink()">اختصار مباشر</button>

        <div id="result-area">
            <p style="font-size: 12px; margin: 0 0 5px 0; color:#fff;">الرابط المختصر (اضغط للنسخ):</p>
            <div id="short-url" onclick="copyUrl()"></div>
        </div>
    </div>

    <script>
        // تأثير النجوم
        const box = document.getElementById('star-box');
        for(let i=0; i<40; i++){
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random()*3+'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random()*100+'vw';
            s.style.animationDuration = Math.random()*3+2+'s';
            s.style.animationDelay = Math.random()*5+'s';
            box.appendChild(s);
        }

        async function shortenLink() {
            const url = document.getElementById('long-url').value;
            const resArea = document.getElementById('result-area');
            const resLink = document.getElementById('short-url');

            if(!url.trim()) {
                alert('الرابط فارغ!');
                return;
            }

            resLink.innerText = "جاري المعالجة...";
            resArea.style.display = "block";

            try {
                // استخدام API موقع Is.gd (مباشر وبدون صفحات انتظار)
                const response = await fetch(`https://is.gd/create.php?format=json&url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                if(data.shorturl) {
                    resLink.innerText = data.shorturl;
                } else {
                    resLink.innerText = "خطأ في الرابط أو المحتوى";
                }
            } catch (error) {
                resLink.innerText = "فشل الاتصال بالخادم";
            }
        }

        function copyUrl() {
            const text = document.getElementById('short-url').innerText;
            if(text.startsWith("http")) {
                navigator.clipboard.writeText(text);
                alert("تم النسخ بنجاح! الرابط جاهز للاستخدام المباشر.");
            }
        }
    </script>
</body>
</html>
