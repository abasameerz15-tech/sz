<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>نص مرفوع</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        /* ===== BODY ===== */
        body {
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* ===== MAIN CARD ===== */
        .main-card {
            max-width: 480px;
            width: 100%;
            background: #0f1322;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8), 
                        0 0 0 1px rgba(100, 180, 255, 0.15);
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header-sky {
            background: linear-gradient(135deg, #7fc9ff 0%, #2b8cff 50%, #0055cc 100%);
            padding: 28px 24px 24px 24px;
            text-align: center;
            position: relative;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .header-sky::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 24px;
            background: #0f1322;
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header-sky h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0, 40, 80, 0.5);
            position: relative;
            z-index: 1;
        }

        .header-sky h1 i {
            margin-left: 6px;
            color: #ffe484;
        }

        .header-sky p {
            font-size: 0.85rem;
            color: #e0f0ff;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        /* ===== CONTENT ===== */
        .content-dark {
            background: #191f2e;
            padding: 24px 20px 28px 20px;
            min-height: 250px;
        }

        /* ===== GREETING ===== */
        .greeting-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 12px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            text-align: center;
            margin-bottom: 16px;
        }

        .greeting-box h2 {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(135deg, #b6d9ff, #7fc9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .greeting-box h2 i {
            color: #ffd966;
            margin-left: 6px;
        }

        .greeting-box .sub {
            font-size: 0.75rem;
            color: #6b7f9e;
            margin-top: 2px;
        }

        /* ===== DISPLAY BOX ===== */
        .display-box {
            background: #0c101e;
            border-radius: 24px;
            padding: 18px 16px;
            border: 1px solid #2f3a52;
            min-height: 120px;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
            color: #d4e0f5;
            font-size: 0.95rem;
            line-height: 1.7;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.7);
            user-select: none;
            -webkit-user-select: none;
            pointer-events: none;
            margin-bottom: 14px;
        }

        .display-box .watermark {
            position: absolute;
            bottom: 6px;
            left: 14px;
            font-size: 0.6rem;
            color: #3c4b66;
        }

        .display-box .timestamp {
            position: absolute;
            bottom: 6px;
            right: 14px;
            font-size: 0.5rem;
            color: #2a3a52;
        }

        .display-box .empty-state {
            color: #6b7f9e;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            gap: 6px;
        }

        .display-box .empty-state i {
            font-size: 2rem;
            color: #3c4b66;
        }

        /* ===== ACTION BUTTONS ===== */
        .action-row {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            background: #1e283b;
            border: none;
            padding: 14px 8px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            color: #d4e0f5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 1px solid #36445e;
            box-shadow: 0 4px 0 #0b0e16;
            transition: all 0.08s linear;
            cursor: pointer;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0b0e16;
        }

        .action-btn i {
            font-size: 1.2rem;
        }

        .action-btn.copy-btn i {
            color: #6fcbff;
        }

        .action-btn.share-btn i {
            color: #ffb74d;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a3f;
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 60px;
            color: #d4e0f5;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.8);
            border: 1px solid #3e5070;
            font-size: 0.85rem;
            z-index: 999;
            transition: all 0.25s ease;
            opacity: 0;
            transform: translateX(-50%) translateY(20px);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== LOADING ===== */
        .loading-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            gap: 14px;
            color: #4a5a7a;
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-placeholder p {
            font-size: 0.85rem;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 16px;
            text-align: center;
            font-size: 0.6rem;
            color: #3c4b66;
            border-top: 1px solid #1a2233;
            padding-top: 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .header-sky h1 { font-size: 1.7rem; }
            .header-sky { padding: 22px 18px 20px 18px; }
            .content-dark { padding: 18px 14px 22px 14px; }
            .action-row { flex-direction: column; gap: 10px; }
            .action-btn { padding: 12px 8px; font-size: 0.95rem; }
            .greeting-box h2 { font-size: 1.1rem; }
            .display-box { padding: 14px 12px; min-height: 100px; font-size: 0.9rem; }
            .toast { font-size: 0.75rem; padding: 8px 16px; white-space: normal; max-width: 90%; }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #0c101e; }
        ::-webkit-scrollbar-thumb { background: #2f3a52; border-radius: 10px; }

        /* ===== SELECTION ===== */
        ::selection { background: rgba(43, 140, 255, 0.3); color: #fff; }
    </style>
</head>
<body>

    <!-- ===== MAIN CARD ===== -->
    <div class="main-card">

        <!-- ===== HEADER ===== -->
        <div class="header-sky">
            <h1><i class="fas fa-cloud-upload-alt"></i> رافع النصوص</h1>
            <p>مشاركة النصوص بسهولة</p>
        </div>

        <!-- ===== CONTENT ===== -->
        <div class="content-dark">

            <!-- ===== GREETING ===== -->
            <div class="greeting-box" id="greetingBox">
                <h2><i class="fas fa-hand-peace"></i> مرحباً بك</h2>
                <div class="sub">تم نشر النص بنجاح</div>
            </div>

            <!-- ===== LOADING ===== -->
            <div class="loading-placeholder" id="loadingPlaceholder">
                <div class="spinner"></div>
                <p>جاري تحميل النص...</p>
            </div>

            <!-- ===== DISPLAY ===== -->
            <div class="display-box" id="displayContent" style="display: none;">
                <div class="empty-state">
                    <i class="fas fa-file-alt"></i>
                    <span>لا يوجد نص لعرضه</span>
                </div>
                <div class="watermark"><i class="fas fa-lock"></i> غير قابل للنسخ</div>
                <div class="timestamp" id="displayTime"></div>
            </div>

            <!-- ===== BUTTONS ===== -->
            <div class="action-row" id="actionRow" style="display: none;">
                <button class="action-btn copy-btn" id="copyBtn">
                    <i class="fas fa-copy"></i> نسخ النص
                </button>
                <button class="action-btn share-btn" id="shareBtn">
                    <i class="fas fa-share-alt"></i> مشاركة
                </button>
            </div>

            <!-- ===== FOOTER ===== -->
            <div class="footer">
                <i class="fas fa-database"></i> محفوظ في Firebase
                <span style="margin: 0 6px;">·</span>
                <i class="fas fa-bolt"></i> تحميل سريع
            </div>

        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ================================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ================================================================ -->
    <script>
        (function() {
            "use strict";

            // ============================================================
            // 1. FIREBASE CONFIG - استبدل ببياناتك
            // ============================================================
            const firebaseConfig = {
                apiKey: "AIzaSyDummyKey",
                authDomain: "save-link-34c39.firebaseapp.com",
                databaseURL: "https://save-link-34c39-default-rtdb.firebaseio.com/",
                projectId: "save-link-34c39",
                storageBucket: "save-link-34c39.appspot.com",
                messagingSenderId: "123456789",
                appId: "1:123456789:web:abcdef"
            };

            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            // ============================================================
            // 2. DOM ELEMENTS
            // ============================================================
            const loadingPlaceholder = document.getElementById('loadingPlaceholder');
            const displayContent = document.getElementById('displayContent');
            const displayTime = document.getElementById('displayTime');
            const actionRow = document.getElementById('actionRow');
            const copyBtn = document.getElementById('copyBtn');
            const shareBtn = document.getElementById('shareBtn');
            const toast = document.getElementById('toast');
            const greetingBox = document.getElementById('greetingBox');

            let currentText = '';
            let toastTimer = null;

            // ============================================================
            // 3. UTILITY FUNCTIONS
            // ============================================================

            function showToast(msg, duration = 1800) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            function formatTimestamp(timestamp) {
                if (!timestamp) return '';
                const date = new Date(timestamp);
                return date.toLocaleString('ar-SA', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            function escapeHTML(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ============================================================
            // 4. RENDER FUNCTIONS
            // ============================================================

            function renderDisplayText(text, timestamp) {
                // إخفاء التحميل وإظهار المحتوى
                loadingPlaceholder.style.display = 'none';
                displayContent.style.display = 'block';
                actionRow.style.display = 'flex';
                greetingBox.style.display = 'block';

                if (!text || text.trim() === '') {
                    displayContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-file-alt"></i>
                            <span>لا يوجد نص لعرضه</span>
                        </div>
                        <div class="watermark"><i class="fas fa-lock"></i> غير قابل للنسخ</div>
                    `;
                    displayTime.textContent = '';
                    return;
                }

                const escapedText = escapeHTML(text);
                displayContent.innerHTML = `
                    ${escapedText.replace(/\n/g, '<br>')}
                    <div class="watermark"><i class="fas fa-lock"></i> غير قابل للنسخ</div>
                `;

                if (timestamp) {
                    displayTime.textContent = '📅 ' + formatTimestamp(timestamp);
                }

                currentText = text;
            }

            function showError(message) {
                loadingPlaceholder.style.display = 'none';
                displayContent.style.display = 'block';
                actionRow.style.display = 'flex';
                greetingBox.style.display = 'block';

                displayContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle" style="color: #ffb74d;"></i>
                        <span style="color: #ffb74d;">${message}</span>
                    </div>
                    <div class="watermark"><i class="fas fa-lock"></i> غير قابل للنسخ</div>
                `;
            }

            // ============================================================
            // 5. FIREBASE OPERATIONS
            // ============================================================

            function getTextFromFirebase(key) {
                return new Promise((resolve, reject) => {
                    const ref = database.ref('save-link/' + key);
                    ref.once('value')
                        .then((snapshot) => {
                            const data = snapshot.val();
                            if (data && data.content) {
                                resolve(data);
                            } else {
                                reject(new Error('النص غير موجود'));
                            }
                        })
                        .catch((error) => {
                            reject(error);
                        });
                });
            }

            // ============================================================
            // 6. LOAD FROM URL
            // ============================================================

            async function loadFromURL() {
                const params = new URLSearchParams(window.location.search);
                const key = params.get('v');

                if (!key) {
                    loadingPlaceholder.style.display = 'none';
                    displayContent.style.display = 'block';
                    actionRow.style.display = 'flex';
                    greetingBox.style.display = 'block';
                    displayContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-link" style="color: #4a5a7a;"></i>
                            <span>الرابط غير صحيح</span>
                            <span style="font-size: 0.75rem; color: #4a5a7a;">تأكد من الرابط المدخل</span>
                        </div>
                        <div class="watermark"><i class="fas fa-lock"></i> غير قابل للنسخ</div>
                    `;
                    return false;
                }

                try {
                    const data = await getTextFromFirebase(key);
                    renderDisplayText(data.content, data.createdAt);

                    if (window.history && window.history.replaceState) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }

                    showToast('📄 تم تحميل النص بنجاح', 1500);
                    return true;

                } catch (error) {
                    let errorMsg = 'حدث خطأ أثناء تحميل النص';
                    if (error.message && error.message.includes('PERMISSION_DENIED')) {
                        errorMsg = '⚠️ خطأ في الأذونات! تأكد من قواعد Firebase';
                    } else if (error.message && error.message.includes('غير موجود')) {
                        errorMsg = '❌ الرابط غير صالح أو منتهي الصلاحية';
                    }
                    showError(errorMsg);
                    showToast(errorMsg, 3000);
                    return false;
                }
            }

            // ============================================================
            // 7. COPY FUNCTION
            // ============================================================

            function copyTextFallback() {
                const textarea = document.createElement('textarea');
                textarea.value = currentText;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('📋 تم نسخ النص بنجاح', 1500);
                } catch (e) {
                    showToast('فشل النسخ، حاول يدوياً', 1500);
                }
                document.body.removeChild(textarea);
            }

            // ============================================================
            // 8. EVENT LISTENERS
            // ============================================================

            copyBtn.addEventListener('click', function() {
                if (!currentText || currentText.trim() === '') {
                    showToast('لا يوجد نص لنسخه', 1500);
                    return;
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(currentText)
                        .then(() => showToast('📋 تم نسخ النص بنجاح', 1500))
                        .catch(() => copyTextFallback());
                } else {
                    copyTextFallback();
                }
            });

            shareBtn.addEventListener('click', function() {
                if (!currentText || currentText.trim() === '') {
                    showToast('لا يوجد نص للمشاركة', 1500);
                    return;
                }

                if (navigator.share) {
                    navigator.share({
                        title: 'نص مرفوع',
                        text: currentText,
                    })
                    .then(() => showToast('تمت المشاركة بنجاح', 1500))
                    .catch((err) => {
                        if (err.name !== 'AbortError') {
                            showToast('تم إلغاء المشاركة', 1500);
                        }
                    });
                } else {
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(currentText)
                            .then(() => showToast('📋 تم نسخ النص للمشاركة', 1500))
                            .catch(() => copyTextFallback());
                    } else {
                        copyTextFallback();
                    }
                }
            });

            // ============================================================
            // 9. PREVENT COPY ON DISPLAY
            // ============================================================

            displayContent.addEventListener('copy', (e) => {
                e.preventDefault();
                showToast('⛔ استخدم زر "نسخ النص"', 1500);
            });

            displayContent.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showToast('⛔ القائمة محظورة', 1200);
            });

            displayContent.addEventListener('selectstart', (e) => {
                e.preventDefault();
            });

            // ============================================================
            // 10. INIT
            // ============================================================

            (function init() {
                loadingPlaceholder.style.display = 'flex';
                displayContent.style.display = 'none';
                actionRow.style.display = 'none';
                loadFromURL();
                console.log('✅ صفحة عرض النص - تم التحميل');
            })();

        })();
    </script>
</body>
</html>
