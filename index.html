<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background-color: #0a0e14; color: white; font-family: sans-serif; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: #151a21; border-radius: 20px; padding: 20px; margin-top: 20px; border: 1px solid #1c2630; }
        .btn { background: #1c2630; padding: 15px; border-radius: 15px; margin-top: 10px; display: block; text-align: center; color: white; text-decoration: none; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #151a21; padding: 10px 0; justify-content: space-around; }
    </style>
</head>
<body>

<!-- الصفحة 1: الرئيسية -->
<div id="p1" class="page active">
    <h1>EX DELTA EXPLOIT</h1>
    <div class="card">
        <h3>معلومات هاك دلتا</h3>
        <p>أهلاً بك في المركز الرسمي... (نصك هنا)</p>
    </div>
</div>

<!-- الصفحة 2: هاكاتنا (الأجهزة) -->
<div id="p2" class="page">
    <h1>EX DELTA EXPLOIT</h1>
    <div class="card">
        <h3>إصدارات الأجهزة</h3>
        <a class="btn">iOS / iPhone</a>
        <a class="btn">Android</a>
    </div>
</div>

<!-- الصفحة 3: قنواتنا -->
<div id="p3" class="page">
    <h1>قنواتنا ومجتمعاتنا</h1>
    <div class="card">
        <a class="btn" style="background:#5865F2;">ديسكورد EX DELTA</a>
        <a class="btn" style="background:#26A5E4;">قناة تيليجرام</a>
    </div>
</div>

<!-- شريط التنقل السفلي -->
<div class="nav">
    <button onclick="show('p1')">الرئيسية</button>
    <button onclick="show('p2')">هاكاتنا</button>
    <button onclick="show('p3')">قنواتنا</button>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
