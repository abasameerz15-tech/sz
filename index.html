<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التحقق | عباس Premium</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #121212;
            --accent-color: #ffffff;
            --text-color: #e0e0e0;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
        }

        .task-box {
            background-color: #181818;
            border: 1px solid #262626;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-text {
            font-size: 14px;
            text-align: right;
        }

        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-disabled {
            background-color: #333 !important;
            color: #777 !important;
            cursor: not-allowed;
            transform: none !important;
        }

        .key-box {
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .key-display {
            background-color: #000;
            border: 1px dashed #444;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 16px;
            color: #00ffcc;
            margin-bottom: 15px;
            word-break: break-all;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        footer {
            margin-top: 25px;
            font-size: 11px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>نظام التحقق العباسي 🖤</h1>
        <p>قم بإتمام المهمة البسيطة بالأسفل للحصول على مفتاحك الخاص.</p>

        <div class="task-box">
            <div class="task-text">
                <strong style="color: #fff; display: block; margin-bottom: 3px;">المهمة الأولى</strong>
                قم بزيارة قناة التيليجرام الخاصة بنا ودعمنا
            </div>
            <a href="https://t.me/SZSTORE_1" target="_blank" id="taskBtn" class="btn">انتقال 🔗</a>
        </div>

        <button id="generateBtn" class="btn btn-disabled" style="width: 100%; padding: 12px;" disabled>توليد المفتاح المميز</button>

        <div class="key-box" id="keyBox">
            <div class="key-display" id="keyText">ABB-XXXXX</div>
            <button id="copyBtn" class="btn" style="width: 100%; background-color: #222; color: #fff; border: 1px solid #333;">نسخ المفتاح 📋</button>
        </div>

        <footer>تطوير المطور عباس © 2026</footer>
    </div>

    <script>
        const taskBtn = document.getElementById('taskBtn');
        const generateBtn = document.getElementById('generateBtn');
        const keyBox = document.getElementById('keyBox');
        const keyText = document.getElementById('keyText');
        const copyBtn = document.getElementById('copyBtn');

        let taskDone = false;

        // عند الضغط على رابط المهمة، يتم تفعيل زر توليد الكود بعد 5 ثوانٍ
        taskBtn.addEventListener('click', () => {
            taskBtn.innerText = "تمت الزيارة ✅";
            setTimeout(() => {
                taskDone = true;
                generateBtn.classList.remove('btn-disabled');
                generateBtn.removeAttribute('disabled');
            }, 3000); // 3 ثوانٍ انتظار للتأكد من الدخول
        });

        // توليد مفتاح مشفر معقد جداً وفريد بناءً على IP العميل وتاريخ اليوم
        generateBtn.addEventListener('click', async () => {
            generateBtn.innerText = "جاري الاتصال وتأمين المفتاح...";
            
            try {
                // جلب الـ IP الخاص باللاعب مجاناً
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const userIP = data.ip;

                // تاريخ اليوم (يتغير كل 24 ساعة لضمان انتهاء صلاحية المفتاح تلقائياً)
                const date = new Date();
                const dayKey = date.getFullYear() + "-" + (date.getMonth() + 1) + "-" + date.getDate();

                // دالة تشفير بسيطة وذكية لتحويل الـ IP والتاريخ إلى كود (مستحيل تخمينه)
                const rawString = userIP + dayKey + "AbbasSecretSalt123!";
                let hash = 0;
                for (let i = 0; i < rawString.length; i++) {
                    hash = (hash << 5) - hash + rawString.charCodeAt(i);
                    hash |= 0;
                }
                
                // المفتاح النهائي الفريد
                const finalKey = "ABS-" + Math.abs(hash).toString(16).toUpperCase();

                // عرض المفتاح
                keyText.innerText = finalKey;
                keyBox.style.display = 'block';
                generateBtn.style.display = 'none';

            } catch (error) {
                // في حال فشل جلب الـ IP يتم إنشاء كود احتياطي معتمد على الوقت
                const fallback = "ABS-FB" + Math.floor(Date.now() / 100000);
                keyText.innerText = fallback;
                keyBox.style.display = 'block';
                generateBtn.style.display = 'none';
            }
        });

        // ميزة النسخ التلقائي
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(keyText.innerText);
            copyBtn.innerText = "تم النسخ بنجاح! 🖤";
            setTimeout(() => { copyBtn.innerText = "نسخ المفتاح 📋"; }, 2000);
        });
    </script>
</body>
</html>
