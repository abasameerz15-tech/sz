<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الفيديوهات الاحترافي إلى WebM</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-area:hover {
            border-color: var(--accent-color);
            background: rgba(59, 130, 246, 0.05);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: none;
        }

        .btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: background 0.2s;
            display: none;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }

        .btn:disabled {
            background-color: #475569;
            cursor: not-allowed;
        }

        /* شريط التقدم */
        .progress-container {
            margin-top: 25px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            background-color: #334155;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .status-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* رابط التحميل */
        #downloadLink {
            display: none;
            margin-top: 25px;
            background-color: var(--success);
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        #downloadLink:hover {
            opacity: 0.9;
        }
    </style>
    <!-- استدعاء مكتبة FFmpeg.wasm للتحويل داخل المتصفح -->
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
</head>
<body>

<div class="container">
    <h1>محول الفيديو إلى WebM</h1>
    <p class="subtitle">قم برفع الفيديو الخاص بك وتحويله بصيغة WebM عالية الجودة مجاناً وبسرعة.</p>

    <!-- منطقة الرفع -->
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🎬</div>
        <p>اضغط هنا لاختيار فيديو أو اسحبه وأفلته هنا</p>
        <input type="file" id="fileInput" accept="video/*">
    </div>

    <!-- معلومات الملف المحدد -->
    <div class="file-info" id="fileInfo"></div>

    <!-- زر التحويل -->
    <button class="btn" id="convertBtn">بدء التحويل إلى WebM</button>

    <!-- شريط التقدم والحالة -->
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">جاري تهيئة المحرك...</div>
    </div>

    <!-- زر التحميل بعد الانتهاء -->
    <a id="downloadLink" href="#" download="converted_video.webm">تحميل ملف WebM الجاهز ✨</a>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    // إنشاء نسخة من FFmpeg مع تفعيل سجلات المتابعة (Log)
    const ffmpeg = createFFmpeg({ log: true });

    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const convertBtn = document.getElementById('convertBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressFill = document.getElementById('progressFill');
    const statusText = document.getElementById('statusText');
    const downloadLink = document.getElementById('downloadLink');

    let selectedFile = null;

    // عند اختيار ملف
    fileInput.addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            fileInfo.textContent = `الملف المختار: ${selectedFile.name} (${(selectedFile.size / (1024 * 1024)).toFixed(2)} MB)`;
            fileInfo.style.display = 'block';
            convertBtn.style.display = 'block';
            // إعادة تصفير العناصر الأخرى
            downloadLink.style.display = 'none';
            progressContainer.style.style = 'none';
        }
    });

    // عند الضغط على زر التحويل
    convertBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        // تجهيز الواجهة
        convertBtn.disabled = true;
        progressContainer.style.display = 'block';
        downloadLink.style.display = 'none';
        progressFill.style.width = '0%';
        statusText.textContent = 'جاري تحميل محرك التحويل (قد يستغرق لحظات في المرة الأولى)...';

        try {
            // 1. تحميل مكتبة FFmpeg إذا لم تكن محملة
            if (!ffmpeg.isLoaded()) {
                await ffmpeg.load();
            }

            statusText.textContent = 'جاري قراءة ملف الفيديو...';
            progressFill.style.width = '20%';

            // 2. كتابة الملف في النظام الوهمي للمكتبة
            ffmpeg.FS('writeFile', 'input_video', await fetchFile(selectedFile));

            statusText.textContent = 'جاري معالجة وتحويل الفيديو إلى WebM (يرجى الانتظار)...';
            progressFill.style.width = '50%';

            // تتبع تقدم العمل من خلال الـ logs بشكل تقريبي
            ffmpeg.setProgress(({ ratio }) => {
                let percentage = Math.round((ratio * 40) + 50); // حساب نسبي يملأ الفراغ بين 50% و 90%
                if(percentage <= 95) progressFill.style.width = `${percentage}%`;
            });

            // 3. تشغيل أمر التحويل (استخدام ترميز vp8 السريع والمتوافق جداً)
            await ffmpeg.run('-i', 'input_video', '-c:v', 'libvpx', '-crf', '22', '-b:v', '1M', '-c:a', 'libvorbis', 'output.webm');

            statusText.textContent = 'اكتمل التحويل بنجاح!';
            progressFill.style.width = '100%';

            // 4. قراءة الملف الناتج وتحويله لرابط تحميل
            const data = ffmpeg.FS('readFile', 'output.webm');
            const webmBlob = new Blob([data.buffer], { type: 'video/webm' });
            const url = URL.createObjectURL(webmBlob);

            // تفعيل زر التحميل
            downloadLink.href = url;
            downloadLink.style.display = 'inline-block';
            
        } catch (error) {
            console.error(error);
            statusText.textContent = 'عذراً، حدث خطأ أثناء التحويل. تأكد من صيغة الملف وحجمه.';
            progressFill.style.backgroundColor = '#ef4444';
        } finally {
            convertBtn.disabled = false;
        }
    });
</script>

</body>
</html>
