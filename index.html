<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أداة رفع النصوص</title>
    <style>
        /* التنسيق العام */
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(180deg, #001f3f, #0074D9); color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .screen { display: none; text-align: center; width: 90%; max-width: 500px; }
        .active { display: block; }
        
        /* نجوم متصاعدة */
        .star { position: absolute; background: white; border-radius: 50%; animation: floatUp 5s linear infinite; }
        @keyframes floatUp { from { transform: translateY(100vh); opacity: 1; } to { transform: translateY(-10vh); opacity: 0; } }

        /* الأزرار والنصوص */
        h1 { margin-bottom: 30px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 15px; border: none; font-size: 16px; box-sizing: border-box; }
        .btn { padding: 12px 30px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; background: #7FDBFF; color: #001f3f; font-weight: bold; transition: 0.3s; }
        
        /* مكان النص غير القابل للنسخ */
        #display-area { user-select: none; -webkit-user-select: none; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; min-height: 100px; margin-bottom: 20px; }
        
        /* الأزرار الصغيرة */
        .action-btn { padding: 5px 15px; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="screen1" class="screen active">
        <h1>مرحباً بك في أداة رفع النصوص ومشاركتها</h1>
        <button class="btn" onclick="showScreen('screen2')">رفع نص</button>
    </div>

    <div id="screen2" class="screen">
        <textarea id="userInput" placeholder="اكتب نصك هنا..."></textarea><br>
        <button class="btn" onclick="saveText()">إنشاء رابط دائم</button>
    </div>

    <div id="screen3" class="screen">
        <div id="display-area"></div>
        <button class="btn action-btn" onclick="shareText()">📤 مشاركة</button>
        <button class="btn action-btn" onclick="copyText()">📋 نسخ</button>
    </div>

    <script>
        // الأصوات
        const clickSound = new Audio('https://www.soundjay.com/buttons/sounds/button-16.mp3');

        // النجوم
        function createStar() {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 5000);
        }
        setInterval(createStar, 300);

        function showScreen(id) {
            clickSound.play();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function saveText() {
            const txt = document.getElementById('userInput').value;
            if (!txt) { alert("اكتب نصاً أولاً!"); return; }
            document.getElementById('display-area').innerText = txt;
            showScreen('screen3');
        }

        function copyText() {
            const text = document.getElementById('display-area').innerText;
            navigator.clipboard.writeText(text);
            alert("تم النسخ بنجاح!");
        }

        function shareText() {
            if (navigator.share) {
                navigator.share({ text: document.getElementById('display-area').innerText });
            } else {
                alert("ميزة المشاركة غير مدعومة في متصفحك");
            }
        }
    </script>
</body>
</html>
