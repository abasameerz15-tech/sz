<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ŞZS DELTA</title>
    <style>
        /* إعدادات الشاشة */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(180deg, #0a2b3d 0%, #000000 100%); 
        }

        /* واجهة التسجيل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 200;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); transition: 0.5s;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.3);
            padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; text-align: center;
        }
        .auth-card h2 { color: #00d4ff; margin-bottom: 10px; font-size: 1.5rem; }
        .auth-card p { color: #ccc; font-size: 0.85rem; margin-bottom: 20px; }
        .auth-input {
            width: 100%; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px; border-radius: 12px; color: #fff; text-align: center; font-size: 1.2rem;
            outline: none; margin-bottom: 15px; letter-spacing: 5px;
        }
        .auth-btn {
            background: #00d4ff; color: #000; border: none; padding: 12px 30px;
            border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%;
        }
        .auth-btn:disabled { background: #444; color: #888; }

        /* العداد العلوي */
        .user-counter {
            position: absolute; top: 15px; right: 15px; z-index: 100; color: #fff;
            font-size: 0.8rem; background: rgba(255, 255, 255, 0.1);
            padding: 5px 12px; border-radius: 20px; backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 5px;
        }

        /* النجوم والجماليات */
        .stars-container { position: absolute; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.6; animation: moveStars 8s linear infinite; }
        @keyframes moveStars { from { transform: translateY(110vh); } to { transform: translateY(-10vh); } }

        .shiny-title {
            font-size: 2.2rem; font-weight: bold; text-align: center; margin: 40px 0 20px;
            background: linear-gradient(120deg, #00d4ff 30%, #ffffff 50%, #00d4ff 70%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shineEffect 3s linear infinite; position: relative; z-index: 10;
        }
        @keyframes shineEffect { to { background-position: 200% center; } }

        /* الصفحات */
        .container { position: relative; z-index: 10; padding: 0 20px; display: none; flex-direction: column; align-items: center; height: 100%; }
        .active-page { display: flex; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 22px; width: 100%; max-width: 380px; margin-bottom: 15px; text-align: center; color: #ddd; }

        .bottom-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 340px; height: 75px; background: #0d0d0d; border-radius: 40px; 
            display: flex; justify-content: center; align-items: center; gap: 50px; 
            border: 1px solid rgba(255, 255, 255, 0.1); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; cursor: pointer; }
        .nav-item.active { color: #00d4ff; }
        .nav-item svg { width: 28px; height: 28px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h2>مرحباً بك! 👋</h2>
            <p>الرجاء كتابة كود 6 من صنعك (أرقام فقط)</p>
            <input type="text" id="userCodeInput" class="auth-input" maxlength="6" placeholder="000000" inputmode="numeric">
            <button class="auth-btn" id="loginBtn" onclick="validateAndLogin()">دخول للموقع</button>
            <p id="errorMsg" style="color: #ff4d4d; margin-top: 12px; font-size: 0.8rem; display: none;"></p>
        </div>
    </div>

    <div class="user-counter">
        <span>عدد مستخدمين موقعنا: 🌐</span>
        <span id="visitorCount">0</span>
    </div>

    <div class="stars-container" id="starField"></div>
    <div class="shiny-title">ŞZS DELTA</div>

    <div id="homePage" class="container">
        <div class="card">
            <h3 style="color:#00d4ff; margin-bottom:10px;">أهلاً بك يا بطل</h3>
            <p>تم تسجيل دخولك بالكود الخاص بك. استمتع بمميزات دلتا.</p>
        </div>
    </div>

    <div id="hacksPage" class="container">
        <div class="card"><p>قريباً.. قسم التحميل المباشر.</p></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="tab('homePage', this)">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        </div>
        <div class="nav-item" onclick="tab('hacksPage', this)">
            <svg viewBox="0 0 24 24"><path d="M12,2A9,9 0 0,0 3,11V22L4.5,20.5L6,22L7.5,20.5L9,22L10.5,20.5L12,22L13.5,20.5L15,22L16.5,20.5L18,22L19.5,20.5L21,22V11A9,9 0 0,0 12,2M9,8A2,2 0 0,1 11,10A2,2 0 0,1 9,12A2,2 0 0,1 7,10A2,2 0 0,1 9,8M15,8A2,2 0 0,1 17,10A2,2 0 0,1 15,12A2,2 0 0,1 13,10A2,2 0 0,1 15,8Z"/></svg>
        </div>
    </nav>

    <script>
        const visitorElement = document.getElementById('visitorCount');
        const loginBtn = document.getElementById('loginBtn');
        const siteID = "szs_delta_v100_final"; // معرف فريد للمشروع

        async function validateAndLogin() {
            const input = document.getElementById('userCodeInput').value;
            const error = document.getElementById('errorMsg');
            
            if (!/^\d{6}$/.test(input)) {
                showError("يجب إدخال 6 أرقام فقط!");
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerText = "جاري التحقق من السيرفر...";
            error.style.display = "none";

            try {
                // نستخدم API بديل سريع (api.countapi.xyz)
                // نفحص إذا الكود موجود
                const res = await fetch(`https://api.counterapi.dev/v1/${siteID}_user_${input}/total`);
                const data = await res.json();

                if (data.count && data.count > 0) {
                    showError("هذا الكود مستخدم من قبل! اختر كوداً آخر.");
                    loginBtn.disabled = false;
                    loginBtn.innerText = "دخول للموقع";
                } else {
                    // تسجيل الكود وزيادة العداد الرئيسي
                    await fetch(`https://api.counterapi.dev/v1/${siteID}_user_${input}/total/increment`);
                    await fetch(`https://api.counterapi.dev/v1/${siteID}_main/total/increment`);
                    
                    localStorage.setItem('user_auth_key', input);
                    showMainContent();
                }
            } catch (e) {
                showError("تنبيه: السيرفر مشغول، جرب تضغط 'دخول' مرة ثانية.");
                loginBtn.disabled = false;
                loginBtn.innerText = "دخول للموقع";
            }
        }

        function showError(msg) {
            const error = document.getElementById('errorMsg');
            error.innerText = msg;
            error.style.display = "block";
        }

        function showMainContent() {
            document.getElementById('authOverlay').style.display = "none";
            document.getElementById('homePage').classList.add('active-page');
            updateLiveCount();
        }

        window.onload = () => {
            if (localStorage.getItem('user_auth_key')) {
                showMainContent();
            }
        };

        async function updateLiveCount() {
            try {
                const res = await fetch(`https://api.counterapi.dev/v1/${siteID}_main/total`);
                const data = await res.json();
                visitorElement.innerText = data.count || 0;
            } catch (e) {}
        }

        setInterval(updateLiveCount, 7000);

        function tab(pageId, el) {
            document.querySelectorAll('.container').forEach(p => p.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // نجوم الخلفية
        const field = document.getElementById('starField');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.width = '2px'; star.style.height = '2px';
            star.style.animationDuration = (Math.random() * 3 + 4) + 's';
            field.appendChild(star);
        }
    </script>
</body>
</html>
